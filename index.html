<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="robots" content="noindex,nofollow">
<title>リソース管理</title>

<script>
(function() {
  const PASS = "1111"; 
  if (sessionStorage.getItem('app_auth') !== PASS) {
    const input = prompt("暗証番号を入力してください");
    if (input === PASS) { sessionStorage.setItem('app_auth', PASS); } 
    else { alert("番号が違います"); location.href = "about:blank"; window.stop(); }
  }
})();
</script>

<script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root { --bg: #0f0f11; --bg2: #17171a; --bg3: #1e1e22; --border: rgba(255,255,255,0.08); --border2: rgba(255,255,255,0.14); --text: #f0f0f2; --text2: #8a8a94; --text3: #555560; --c0: #7c6ff7; --c1: #2ec99a; --radius: 10px; --radius-lg: 14px; }
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: 'Noto Sans JP', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 14px; line-height: 1.5; }
.team-tabs { display: flex; background: #000; padding: 8px 12px 0; gap: 4px; border-bottom: 1px solid var(--border); overflow-x: auto; scrollbar-width: none; }
.team-tab { padding: 10px 20px; background: var(--bg2); border: 1px solid var(--border); border-bottom: none; border-radius: 8px 8px 0 0; color: var(--text2); font-size: 12px; cursor: pointer; white-space: nowrap; font-weight: 700; }
.team-tab.active { background: var(--c0); color: #fff; border-color: var(--c0); }
.header { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--bg); z-index: 100; flex-wrap: wrap; gap: 10px; }
.nav-box { display: flex; align-items: center; gap: 8px; background: var(--bg2); padding: 4px 8px; border-radius: 8px; }
.nav-box button { width: 32px; height: 32px; background: var(--bg3); border: 1px solid var(--border); border-radius: 6px; color: #fff; font-size: 18px; }
.nav-box .label { font-family: 'DM Mono', monospace; font-size: 12px; min-width: 100px; text-align: center; font-weight: 500; }
.main { padding: 16px; max-width: 1400px; margin: 0 auto; }
.member-stats-bar { display: flex; overflow-x: auto; gap: 8px; margin-bottom: 20px; padding-bottom: 5px; scrollbar-width: none; }
.member-stat-card { flex: 0 0 100px; background: var(--bg2); border: 1px solid var(--border); padding: 10px; border-radius: var(--radius); text-align: center; }
.ms-score { font-family: 'DM Mono', monospace; font-size: 18px; font-weight: 700; color: var(--c0); }
.ch-grid { display: grid; grid-template-columns: 1fr; gap: 16px; }
@media (min-width: 768px) { .ch-grid { grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); } }
.ch-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; margin-bottom: 10px; }
.ch-card-header { padding: 16px; border-bottom: 1px solid var(--border); font-weight: 700; display: flex; align-items: center; justify-content: space-between; font-size: 15px; }
.achieve-wrap { padding: 12px 16px; background: var(--bg); margin: 10px 16px; border-radius: 8px; }
.achieve-head { display: flex; justify-content: space-between; margin-bottom: 6px; font-size: 11px; color: var(--text3); font-weight: 700; }
.achieve-track { height: 6px; background: var(--bg3); border-radius: 3px; overflow: hidden; }
.vid-list { padding: 0 16px 16px; display: flex; flex-direction: column; gap: 10px; }
.vid-item { background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px; }
.tk-item { display: flex; align-items: center; gap: 8px; background: var(--bg3); padding: 8px 12px; border-radius: 8px; border: 1px solid var(--border); margin-bottom: 4px; }
.tk-select { background: var(--bg); border: 1px solid var(--border2); color: var(--text2); font-size: 11px; border-radius: 4px; padding: 4px; flex: 1; }
</style>
</head>
<body>

<div class="team-tabs" id="team-tabs"></div>
<header class="header">
  <div class="nav-box">
    <button onclick="changeTime(-1)">‹</button>
    <span class="label" id="time-label"></span>
    <button onclick="changeTime(1)">›</button>
  </div>
  <button style="background:none; border:1px solid var(--border2); color:var(--text2); padding:8px 12px; border-radius:8px; cursor:pointer; font-size:11px; flex-grow: 1; text-align: center;" onclick="openSettings()">管理設定</button>
</header>

<main class="main">
  <div class="member-stats-bar" id="member-stats"></div>
  <div class="ch-grid" id="ch-grid"></div>
</main>

<div id="modal-root"></div>

<script>
const firebaseConfig = { databaseURL: "https://task-fca42-default-rtdb.asia-southeast1.firebasedatabase.app/" };
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let teams = ['チームA', 'チームB'];
let activeTeam = teams[0];
let timeOff = 0;
let remoteData = {};
let MEMBERS = [];
let CHANNELS = [];

function init() {
  db.ref('settings/teamList').on('value', (snap) => {
    const list = snap.val();
    if (list) { 
      teams = list.split(',').map(s => s.trim());
      if (!teams.includes('TikTok')) teams.push('TikTok');
      if (!teams.includes(activeTeam)) activeTeam = teams[0]; 
    }
    renderTabs(); connectTeam();
  });
}

function renderTabs() {
  const container = document.getElementById('team-tabs');
  container.innerHTML = teams.map(t => `<div class="team-tab ${t === activeTeam ? 'active' : ''}" onclick="switchTeam('${t}')">${t}</div>`).join('');
}

function switchTeam(teamName) { activeTeam = teamName; renderTabs(); connectTeam(); }

function connectTeam() {
  db.ref(activeTeam).off();
  db.ref(activeTeam).on('value', (snap) => {
    remoteData = snap.val() || {};
    MEMBERS = remoteData.members || ['メンバーA', 'メンバーB'];
    const chRaw = remoteData.channels || 'ゆっきーTV:8,湿度ch:8';
    CHANNELS = chRaw.split(',').map((item, i) => {
      const [name, target] = item.split(':');
      return {
        name: name.trim(),
        target: parseInt(target) || 8,
        color: ['#7c6ff7', '#2ec99a', '#f07040', '#e8608a', '#ffcc00', '#ff3366'][i % 6]
      };
    });
    updateLabels(); renderStats(); buildGrid();
  });
}

function getTimeKey() {
  const d = new Date(); d.setMonth(d.getMonth() + timeOff);
  return `m_${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
}

function updateLabels() {
  const d = new Date(); d.setMonth(d.getMonth() + timeOff);
  document.getElementById('time-label').textContent = `${d.getFullYear()}年 ${d.getMonth()+1}月`;
}

function renderStats() {
  const tk = getTimeKey(); const scores = {};
  MEMBERS.forEach(m => scores[m] = 0);
  CHANNELS.forEach((_, ci) => {
    const n = ((remoteData.cnt || {})[tk] || {})[ci] || (activeTeam === 'TikTok' ? 30 : 1);
    const chVids = ((remoteData.vids || {})[tk] || {})[ci] || {};
    for (let i = 0; i < n; i++) {
      const d = chVids[i] || {};
      if(activeTeam === 'TikTok') {
        if(d.s_member) scores[d.s_member] = (scores[d.s_member]||0) + 0.5;
        if(d.p_member) scores[d.p_member] = (scores[d.p_member]||0) + 0.5;
      } else {
        (d.s_members || []).forEach(m => { if(scores[m]!==undefined) scores[m] += 0.5; });
        (d.p_members || []).forEach(m => { if(scores[m]!==undefined) scores[m] += 0.5; });
      }
    }
  });
  const container = document.getElementById('member-stats');
  container.innerHTML = MEMBERS.map(m => `
    <div class="member-stat-card">
      <div style="font-size:10px;color:var(--text2)">${m}</div>
      <div class="ms-score">${(scores[m]||0).toFixed(1)}</div>
    </div>
  `).join('');
}

function buildGrid() {
  const tk = getTimeKey();
  const grid = document.getElementById('ch-grid'); grid.innerHTML = '';
  CHANNELS.forEach((ch, ci) => {
    const n = ((remoteData.cnt || {})[tk] || {})[ci] || (activeTeam === 'TikTok' ? 30 : 1);
    let doneCount = 0;
    const vids = ((remoteData.vids || {})[tk] || {})[ci] || {};
    
    const card = document.createElement('div'); card.className = 'ch-card';
    card.innerHTML = `
      <div class="ch-card-header"><div style="display:flex;align-items:center;gap:10px;"><div style="width:5px;height:18px;border-radius:2px;background:${ch.color}"></div>${ch.name}</div></div>
      <div class="achieve-wrap">
        <div class="achieve-head"><span>月間進捗</span><span id="prog-text-${ci}">0/${ch.target}</span></div>
        <div class="achieve-track"><div id="prog-bar-${ci}" style="height:100%; width:0%; background:${ch.color}; transition:0.4s;"></div></div>
      </div>
      <div class="vid-list" id="list-${ci}"></div>
      <div style="padding: 10px 16px; border-top: 1px solid var(--border); font-size:11px; color:var(--text3)">
        今月の枠数: <input type="number" style="width:50px; background:var(--bg3); border:1px solid var(--border); color:#fff; text-align:center;" value="${n}" onchange="updateCnt('${tk}', ${ci}, this.value)">
      </div>
    `;
    grid.appendChild(card);
    
    const listCont = document.getElementById(`list-${ci}`);
    for (let i = 0; i < n; i++) {
      const d = vids[i] || {};
      const div = document.createElement('div');
      
      if (activeTeam === 'TikTok') {
        // TikTokモード: 簡略UI
        const isSet = d.s_member || d.p_member;
        if(isSet) doneCount++;
        div.className = 'tk-item';
        div.innerHTML = `
          <div style="font-size:10px; color:var(--text3); min-width:20px;">${i+1}</div>
          <select class="tk-select" onchange="updateVal('${tk}',${ci},${i},'s_member',this.value)">
            <option value="">撮影者</option>
            ${MEMBERS.map(m => `<option value="${m}" ${d.s_member===m?'selected':''}>${m}</option>`).join('')}
          </select>
          <select class="tk-select" onchange="updateVal('${tk}',${ci},${i},'p_member',this.value)">
            <option value="">編集者</option>
            ${MEMBERS.map(m => `<option value="${m}" ${d.p_member===m?'selected':''}>${m}</option>`).join('')}
          </select>
        `;
      } else {
        // 通常モード
        if(d.posted) doneCount++;
        div.className = `vid-item ${d.posted?'is-done':''}`;
        div.style.marginBottom = "8px";
        div.innerHTML = `
          <div style="display:flex;gap:8px;margin-bottom:8px;">
            <input type="text" class="tk-select" style="flex:2;padding:8px;" placeholder="タイトル" value="${d.title||''}" onchange="updateVal('${tk}',${ci},${i},'title',this.value)">
            <button class="status-btn ${d.posted?'done':'pre'}" onclick="togglePost('${tk}',${ci},${i})">${d.posted?'済':'未'}</button>
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:10px;">
            <div>撮影:${(d.s_members||[]).join(',')} <button onclick="pickM('${tk}',${ci},${i},'s')">+</button></div>
            <div>編集:${(d.p_members||[]).join(',')} <button onclick="pickM('${tk}',${ci},${i},'p')">+</button></div>
          </div>
        `;
      }
      listCont.appendChild(div);
    }
    document.getElementById(`prog-text-${ci}`).textContent = `${doneCount}/${ch.target}`;
    document.getElementById(`prog-bar-${ci}`).style.width = `${Math.min(100, (doneCount/ch.target)*100)}%`;
  });
}

// --- 操作系 ---
window.updateVal = (tk, ci, vi, key, val) => db.ref(`${activeTeam}/vids/${tk}/${ci}/${vi}`).update({ [key]: val });
window.updateCnt = (tk, ci, val) => db.ref(`${activeTeam}/cnt/${tk}/${ci}`).set(parseInt(val)||1);
window.togglePost = (tk, ci, vi) => {
  const cur = (((remoteData.vids||{})[tk]||{})[ci]||{})[vi]||{};
  db.ref(`${activeTeam}/vids/${tk}/${ci}/${vi}`).update({ posted: !cur.posted });
};
window.pickM = (tk, ci, vi, type) => {
  const m = prompt("名前を入力 (または空でリセット)");
  const key = type === 's' ? 's_members' : 'p_members';
  db.ref(`${activeTeam}/vids/${tk}/${ci}/${vi}/${key}`).set(m ? [m] : []);
};
window.changeTime = (n) => { timeOff += n; updateLabels(); };

window.openSettings = () => {
  const root = document.getElementById('modal-root');
  const chRaw = CHANNELS.map(c => `${c.name}:${c.target}`).join(',');
  root.innerHTML = `<div style="position:fixed;inset:0;background:rgba(0,0,0,0.9);display:flex;align-items:center;justify-content:center;z-index:200;padding:20px;"><div style="background:var(--bg2);padding:24px;border-radius:var(--radius-lg);width:100%;max-width:360px;">
    <div style="font-weight:700;margin-bottom:15px;color:var(--c0);">管理設定</div>
    <div style="font-size:11px;color:var(--text3);margin-bottom:4px;">チーム名 (カンマ区切り)</div>
    <input id="t-list" type="text" value="${teams.filter(t=>t!=='TikTok').join(',')}" style="width:100%;background:var(--bg3);color:#fff;border:1px solid var(--border);padding:10px;margin-bottom:15px;">
    <div style="font-size:11px;color:var(--text3);margin-bottom:4px;">${activeTeam}のチャンネル (名前:目標本数, ...)</div>
    <input id="c-list" type="text" value="${chRaw}" style="width:100%;background:var(--bg3);color:#fff;border:1px solid var(--border);padding:10px;margin-bottom:15px;">
    <div style="font-size:11px;color:var(--text3);margin-bottom:4px;">メンバー名 (改行)</div>
    <textarea id="m-list" style="width:100%;height:100px;background:var(--bg3);color:#fff;border:1px solid var(--border);padding:10px;">${MEMBERS.join('\n')}</textarea>
    <button style="width:100%;padding:15px;background:var(--c0);color:#fff;border:none;margin-top:15px;" onclick="saveAll()">保存</button>
  </div></div>`;
};
window.saveAll = () => {
  const tList = document.getElementById('t-list').value;
  const mList = document.getElementById('m-list').value.split('\n').map(s=>s.trim()).filter(Boolean);
  const cList = document.getElementById('c-list').value;
  db.ref('settings/teamList').set(tList);
  db.ref(`${activeTeam}`).update({ members: mList, channels: cList }).then(() => { document.getElementById('modal-root').innerHTML=''; });
};

init();
</script>
</body>
</html>
