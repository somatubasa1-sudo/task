
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="robots" content="noindex,nofollow">
<title>リソース管理</title>

<script>
(function() {
  const PASS = "1111"; 
  if (sessionStorage.getItem('app_auth') !== PASS) {
    const input = prompt("暗証番号を入力してください");
    if (input === PASS) { sessionStorage.setItem('app_auth', PASS); } 
    else { alert("番号が違います"); location.href = "about:blank"; window.stop(); }
  }
})();
</script>

<script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root { --bg: #0f0f11; --bg2: #17171a; --bg3: #1e1e22; --border: rgba(255,255,255,0.08); --border2: rgba(255,255,255,0.14); --text: #f0f0f2; --text2: #8a8a94; --text3: #555560; --c0: #7c6ff7; --c1: #2ec99a; --radius: 10px; --radius-lg: 14px; }
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: 'Noto Sans JP', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 14px; line-height: 1.5; }
.team-tabs { display: flex; background: #000; padding: 8px 12px 0; gap: 4px; border-bottom: 1px solid var(--border); overflow-x: auto; scrollbar-width: none; }
.team-tab { padding: 10px 20px; background: var(--bg2); border: 1px solid var(--border); border-bottom: none; border-radius: 8px 8px 0 0; color: var(--text2); font-size: 12px; cursor: pointer; white-space: nowrap; font-weight: 700; }
.team-tab.active { background: var(--c0); color: #fff; border-color: var(--c0); }
.header { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--bg); z-index: 100; flex-wrap: wrap; gap: 10px; }
.nav-box { display: flex; align-items: center; gap: 8px; background: var(--bg2); padding: 4px 8px; border-radius: 8px; }
.nav-box button { width: 32px; height: 32px; background: var(--bg3); border: 1px solid var(--border); border-radius: 6px; color: #fff; font-size: 18px; }
.nav-box .label { font-family: 'DM Mono', monospace; font-size: 12px; min-width: 100px; text-align: center; font-weight: 500; }
.main { padding: 16px; max-width: 1400px; margin: 0 auto; }
.member-stats-bar { display: flex; overflow-x: auto; gap: 8px; margin-bottom: 20px; padding-bottom: 5px; scrollbar-width: none; }
.member-stat-card { flex: 0 0 100px; background: var(--bg2); border: 1px solid var(--border); padding: 10px; border-radius: var(--radius); text-align: center; }
.ms-score { font-family: 'DM Mono', monospace; font-size: 18px; font-weight: 700; color: var(--c0); }
.ch-grid { display: grid; grid-template-columns: 1fr; gap: 16px; }
@media (min-width: 768px) { .ch-grid { grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); } }
.ch-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; margin-bottom: 10px; }
.ch-card-header { padding: 16px; border-bottom: 1px solid var(--border); font-weight: 700; display: flex; align-items: center; justify-content: space-between; font-size: 15px; cursor: pointer; }
.ch-card-header:active { background: var(--bg3); }
.ch-color { width: 5px; height: 18px; border-radius: 2px; margin-right: 10px; }
.achieve-wrap { padding: 12px 16px; background: var(--bg); cursor: pointer; }
.achieve-head { display: flex; justify-content: space-between; margin-bottom: 6px; font-size: 11px; color: var(--text3); font-weight: 700; }
.achieve-track { height: 6px; background: var(--bg3); border-radius: 3px; overflow: hidden; }
/* 格納エリアの制御 */
.ch-body { display: none; padding-top: 10px; border-top: 1px solid var(--border); }
.ch-card.is-open .ch-body { display: block; }
.expand-icon { font-size: 12px; color: var(--text3); transition: 0.3s; }
.ch-card.is-open .expand-icon { transform: rotate(180deg); }

.vid-list { padding: 0 16px 16px; display: flex; flex-direction: column; gap: 10px; }
.section-label { font-size: 10px; font-weight: 700; color: var(--text3); padding: 14px 0 4px; letter-spacing: 0.1em; }
.vid-item { background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px; }
.vid-item.is-done { border: 1.5px solid var(--c1); background: rgba(46, 201, 154, 0.05); }
.status-row { display: flex; gap: 8px; align-items: center; margin-bottom: 12px; }
.vid-title-input { flex: 1; background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; color: #fff; font-size: 13px; padding: 10px; }
.status-btn { padding: 10px 12px; border-radius: 8px; font-size: 11px; font-weight: 700; cursor: pointer; border: none; min-width: 70px; }
.status-btn.pre { background: var(--bg); color: var(--text3); border: 1px solid var(--border2); }
.status-btn.done { background: var(--c1); color: #000; }
.assign-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.assign-col-label { font-size: 9px; color: var(--text3); font-weight: 700; margin-bottom: 4px; text-align: center; border-bottom: 1px solid var(--border); padding-bottom: 2px; }
.m-check-list { display: flex; flex-direction: column; gap: 4px; }
.m-check { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--text2); cursor: pointer; padding: 2px 0; }
.m-check input { width: 14px; height: 14px; accent-color: var(--c0); }
.ch-bulk-box { background: var(--bg3); padding: 10px; margin: 0 16px 10px; border-radius: 8px; border: 1px solid var(--border2); display: flex; gap: 6px; align-items: center; }
.ch-bulk-box select { background: var(--bg); color: #fff; border: 1px solid var(--border2); padding: 6px; border-radius: 4px; font-size: 11px; flex: 1; }
.ch-bulk-box button { background: var(--c0); border: none; color: #fff; padding: 6px 10px; border-radius: 4px; font-size: 11px; font-weight: 700; }
</style>
</head>
<body>

<div class="team-tabs" id="team-tabs"></div>
<header class="header">
  <div class="nav-box">
    <button onclick="changeTime(-1)">‹</button>
    <span class="label" id="time-label"></span>
    <button onclick="changeTime(1)">›</button>
  </div>
  <button style="background:none; border:1px solid var(--border2); color:var(--text2); padding:8px 12px; border-radius:8px; cursor:pointer; font-size:11px; flex-grow: 1; text-align: center;" onclick="openSettings()">管理設定</button>
</header>

<main class="main">
  <div class="member-stats-bar" id="member-stats"></div>
  <div class="ch-grid" id="ch-grid"></div>
</main>

<div id="modal-root"></div>

<script>
const firebaseConfig = { databaseURL: "https://task-fca42-default-rtdb.asia-southeast1.firebasedatabase.app/" };
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let teams = ['チームA', 'チームB'];
let activeTeam = teams[0];
let timeOff = 0;
let remoteData = {};
let MEMBERS = [];
let CHANNELS = [];
// 開閉状態を保存するSet
let openChannels = new Set();

function init() {
  db.ref('settings/teamList').on('value', (snap) => {
    const list = snap.val();
    if (list) { teams = list.split(',').map(s => s.trim()); if (!teams.includes(activeTeam)) activeTeam = teams[0]; }
    renderTabs(); connectTeam();
  });
}

function renderTabs() {
  const container = document.getElementById('team-tabs');
  container.innerHTML = teams.map(t => `<div class="team-tab ${t === activeTeam ? 'active' : ''}" onclick="switchTeam('${t}')">${t}</div>`).join('');
}

function switchTeam(teamName) { 
  activeTeam = teamName; 
  openChannels.clear(); // チーム切り替え時はリセット
  renderTabs(); 
  connectTeam(); 
}

function connectTeam() {
  db.ref(activeTeam).off();
  db.ref(activeTeam).on('value', (snap) => {
    remoteData = snap.val() || {};
    MEMBERS = remoteData.members || ['メンバーA', 'メンバーB'];
    const chRaw = remoteData.channels || 'ゆっきーTV:8,湿度ch:8';
    CHANNELS = chRaw.split(',').map((item, i) => {
      const [name, target] = item.split(':');
      return { name: name.trim(), target: parseInt(target) || 8, color: ['#7c6ff7', '#2ec99a', '#f07040', '#e8608a', '#ffcc00', '#ff3366'][i % 6] };
    });
    updateLabels(); renderStats(); buildGrid();
  });
}

function getTimeKey() {
  const d = new Date(); d.setMonth(d.getMonth() + timeOff);
  return `m_${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
}

function updateLabels() {
  const d = new Date(); d.setMonth(d.getMonth() + timeOff);
  document.getElementById('time-label').textContent = `${d.getFullYear()}年 ${d.getMonth()+1}月`;
}

function renderStats() {
  const tk = getTimeKey(); const scores = {};
  MEMBERS.forEach(m => scores[m] = 0);
  CHANNELS.forEach((_, ci) => {
    const n = ((remoteData.cnt || {})[tk] || {})[ci] || (activeTeam==='TikTok'?30:1);
    const vids = ((remoteData.vids || {})[tk] || {})[ci] || {};
    for (let i = 0; i < n; i++) {
      const d = vids[i] || {};
      (d.s_members || []).forEach(m => { if(scores[m]!==undefined) scores[m] += 0.5; });
      (d.p_members || []).forEach(m => { if(scores[m]!==undefined) scores[m] += 0.5; });
    }
  });
  const container = document.getElementById('member-stats');
  container.innerHTML = MEMBERS.map(m => `<div class="member-stat-card"><div style="font-size:10px;color:var(--text2)">${m}</div><div class="ms-score">${scores[m].toFixed(1)}</div></div>`).join('');
}

function applyChBulk(ci, event) {
  event.stopPropagation();
  const s = document.getElementById(`bulk-s-${ci}`).value;
  const p = document.getElementById(`bulk-p-${ci}`).value;
  if(!s && !p) return;
  const tk = getTimeKey();
  const n = ((remoteData.cnt || {})[tk] || {})[ci] || (activeTeam==='TikTok'?30:1);
  if(!confirm(`${CHANNELS[ci].name}の全${n}枠に担当者を適応しますか？`)) return;
  for(let i=0; i<n; i++) {
    const upd = {};
    if(s) upd.s_members = [s];
    if(p) upd.p_members = [p];
    db.ref(`${activeTeam}/vids/${tk}/${ci}/${i}`).update(upd);
  }
}

function toggleCard(ci) {
  if (openChannels.has(ci)) {
    openChannels.delete(ci);
  } else {
    openChannels.add(ci);
  }
  buildGrid(); // 再描画
}

function buildGrid() {
  const tk = getTimeKey();
  const grid = document.getElementById('ch-grid'); grid.innerHTML = '';
  CHANNELS.forEach((ch, ci) => {
    const n = ((remoteData.cnt || {})[tk] || {})[ci] || (activeTeam==='TikTok'?30:1);
    let postedCount = 0;
    const workItems = [], doneItems = [];
    for (let i = 0; i < n; i++) {
      const d = (((remoteData.vids || {})[tk] || {})[ci] || {})[i] || { title:'', posted:false };
      if (d.posted) { postedCount++; doneItems.push({ vi: i, data: d }); } else { workItems.push({ vi: i, data: d }); }
    }
    const pct = Math.min(100, Math.round((postedCount / ch.target) * 100));
    const isOpen = openChannels.has(ci);

    const card = document.createElement('div'); 
    card.className = `ch-card ${isOpen ? 'is-open' : ''}`;
    card.innerHTML = `
      <div class="ch-card-header" onclick="toggleCard(${ci})">
        <div style="display:flex; align-items:center;"><div class="ch-color" style="background:${ch.color}"></div>${ch.name}</div>
        <div class="expand-icon">▼</div>
      </div>
      <div class="achieve-wrap" onclick="toggleCard(${ci})">
        <div class="achieve-head"><span>月間進捗</span><span>${postedCount}/${ch.target}</span></div>
        <div class="achieve-track"><div style="height:100%; width:${pct}%; background:${ch.color}; transition:0.4s;"></div></div>
      </div>
      <div class="ch-body">
        <div class="ch-bulk-box">
          <select id="bulk-s-${ci}" onclick="event.stopPropagation()"><option value="">撮影一括</option>${MEMBERS.map(m=>`<option value="${m}">${m}</option>`).join('')}</select>
          <select id="bulk-p-${ci}" onclick="event.stopPropagation()"><option value="">編集一括</option>${MEMBERS.map(m=>`<option value="${m}">${m}</option>`).join('')}</select>
          <button onclick="applyChBulk(${ci}, event)">全適応</button>
        </div>
        <div class="vid-list">
          <div id="done-${ci}"></div>
          <div class="section-label">制作中</div>
          <div id="work-${ci}"></div>
          <div style="padding-top:10px; font-size:11px; color:var(--text3)">
            枠数: <input type="number" style="width:50px; background:var(--bg3); border:1px solid var(--border); color:#fff; text-align:center;" value="${n}" onchange="updateCnt('${tk}', ${ci}, this.value)" onclick="event.stopPropagation()">
          </div>
        </div>
      </div>
    `;
    grid.appendChild(card);
    renderList(ci, doneItems, `done-${ci}`, tk); renderList(ci, workItems, `work-${ci}`, tk);
  });
}

function renderList(ci, items, containerId, tk) {
  const container = document.getElementById(containerId);
  const isTikTok = activeTeam === 'TikTok';
  items.forEach(item => {
    const d = item.data; const div = document.createElement('div'); div.className = `vid-item ${d.posted ? 'is-done' : ''}`;
    div.style.marginBottom = "8px";
    div.innerHTML = `
      <div class="status-row">
        ${isTikTok ? `<div style="flex:1; font-size:12px; font-weight:700; color:var(--text2)"># ${item.vi + 1}</div>` : 
        `<input type="text" class="vid-title-input" placeholder="タイトル..." value="${d.title||''}" onchange="updateValue('${tk}', ${ci}, ${item.vi}, 'title', this.value)">`}
        <button class="status-btn ${d.posted?'done':'pre'}" onclick="togglePosted('${tk}', ${ci}, ${item.vi}, event)">${d.posted?'済':'未'}</button>
      </div>
      <div class="assign-grid">
        <div><div class="assign-col-label">撮影者</div><div class="m-check-list">${MEMBERS.map(m => `<label class="m-check"><input type="checkbox" ${(d.s_members||[]).includes(m)?'checked':''} onchange="toggleMember('${tk}', ${ci}, ${item.vi}, '${m}', 's')"><span>${m}</span></label>`).join('')}</div></div>
        <div><div class="assign-col-label">編集者</div><div class="m-check-list">${MEMBERS.map(m => `<label class="m-check"><input type="checkbox" ${(d.p_members||[]).includes(m)?'checked':''} onchange="toggleMember('${tk}', ${ci}, ${item.vi}, '${m}', 'p')"><span>${m}</span></label>`).join('')}</div></div>
      </div>
    `;
    container.appendChild(div);
  });
}

window.updateValue = (tk, ci, vi, key, val) => db.ref(`${activeTeam}/vids/${tk}/${ci}/${vi}`).update({ [key]: val });
window.togglePosted = (tk, ci, vi, event) => {
  event.stopPropagation();
  const d = (((remoteData.vids || {})[getTimeKey()] || {})[ci] || {})[vi] || { posted: false };
  db.ref(`${activeTeam}/vids/${getTimeKey()}/${ci}/${vi}`).update({ posted: !d.posted });
};
window.toggleMember = (tk, ci, vi, member, type) => {
  const key = type === 's' ? 's_members' : 'p_members';
  let list = ((((remoteData.vids || {})[tk] || {})[ci] || {})[vi] || {})[key] || [];
  list = list.includes(member) ? list.filter(m => m !== member) : [...list, member];
  db.ref(`${activeTeam}/vids/${tk}/${ci}/${vi}/${key}`).set(list);
};
window.updateCnt = (tk, ci, val) => db.ref(`${activeTeam}/cnt/${tk}/${ci}`).set(Math.max(1, parseInt(val)||1));
window.changeTime = (n) => { timeOff += n; updateLabels(); };

window.openSettings = () => {
  const root = document.getElementById('modal-root');
  const chRaw = CHANNELS.map(c => `${c.name}:${c.target}`).join(',');
  root.innerHTML = `<div style="position:fixed;inset:0;background:rgba(0,0,0,0.9);display:flex;align-items:center;justify-content:center;z-index:200;padding:20px;"><div style="background:var(--bg2);padding:24px;border-radius:var(--radius-lg);width:100%;max-width:360px;max-height:90vh;overflow-y:auto;">
    <div style="font-weight:700;margin-bottom:15px;color:var(--c0);font-size:18px;">管理設定</div>
    <div style="font-size:12px;color:var(--text3);margin-bottom:5px;">チーム名（カンマ区切り）</div>
    <input id="t-list" type="text" value="${teams.join(',')}" style="width:100%;background:var(--bg3);color:#fff;border:1px solid var(--border2);padding:10px;border-radius:8px;font-size:13px;margin-bottom:15px;">
    <div style="font-size:12px;color:var(--text3);margin-bottom:5px;">${activeTeam}のチャンネル（名前:目標本数, ...）</div>
    <input id="c-list" type="text" value="${chRaw}" style="width:100%;background:var(--bg3);color:#fff;border:1px solid var(--border2);padding:10px;border-radius:8px;font-size:13px;margin-bottom:15px;">
    <div style="font-size:12px;color:var(--text3);margin-bottom:5px;">メンバー名（改行）</div>
    <textarea id="m-list" style="width:100%;height:120px;background:var(--bg3);color:#fff;border:1px solid var(--border2);padding:12px;border-radius:8px;font-size:13px;">${MEMBERS.join('\n')}</textarea>
    <button style="width:100%;padding:15px;background:var(--c0);border:none;color:#fff;font-weight:700;border-radius:8px;margin-top:20px;" onclick="saveAll()">保存して閉じる</button>
  </div></div>`;
};
window.saveAll = () => {
  const tList = document.getElementById('t-list').value.trim();
  const mList = document.getElementById('m-list').value.split('\n').map(s => s.trim()).filter(Boolean);
  const cList = document.getElementById('c-list').value.trim();
  db.ref('settings/teamList').set(tList);
  db.ref(`${activeTeam}`).update({ members: mList, channels: cList }).then(() => { document.getElementById('modal-root').innerHTML=''; });
};
init();
</script>
</body>
</html>
